<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" role="img" aria-label="Workflow VAPI : 5 étapes de l'appel entrant au mail de confirmation">
  <defs>
    <filter id="b" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="#0d1c2f"/>

  <!-- Glow behind VAPI node -->
  <ellipse cx="268" cy="100" rx="100" ry="70" fill="rgba(37,99,235,0.2)" filter="url(#b)"/>

  <!-- ── NODE 1 · Appel entrant ── -->
  <rect x="20" y="50" width="130" height="100" rx="12"
        fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <g transform="translate(75,78) scale(0.833)"
     fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.07 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3 1.18h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 5.82 5.82l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
  </g>
  <!-- Sound waves -->
  <path d="M101 83 Q107 91 107 100 Q107 109 101 117" fill="none" stroke="rgba(148,163,184,0.35)" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M105 79 Q113 90 113 100 Q113 110 105 121" fill="none" stroke="rgba(148,163,184,0.18)" stroke-width="1.2" stroke-linecap="round"/>
  <text x="85" y="163" text-anchor="middle"
        fill="rgba(255,255,255,0.45)" font-family="Inter,system-ui,sans-serif"
        font-size="9.5" font-weight="600" letter-spacing="0.8">APPEL</text>
  <text x="85" y="176" text-anchor="middle"
        fill="rgba(255,255,255,0.45)" font-family="Inter,system-ui,sans-serif"
        font-size="9.5" font-weight="600" letter-spacing="0.8">ENTRANT</text>

  <!-- Arrow 1 → 2 -->
  <line x1="152" y1="100" x2="190" y2="100"
        stroke="rgba(255,255,255,0.18)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="188,95 201,100 188,105" fill="rgba(255,255,255,0.22)"/>

  <!-- ── NODE 2 · Qualification VAPI (highlighted) ── -->
  <rect x="203" y="50" width="130" height="100" rx="12"
        fill="rgba(37,99,235,0.22)" stroke="rgba(37,99,235,0.6)" stroke-width="1.2"/>
  <g transform="translate(258,78) scale(0.833)"
     fill="none" stroke="#7ca8ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect width="18" height="10" x="3" y="11" rx="2"/>
    <circle cx="12" cy="5" r="2"/>
    <path d="M12 7v4"/>
    <line x1="8" x2="8" y1="16" y2="16"/>
    <line x1="16" x2="16" y1="16" y2="16"/>
  </g>
  <text x="268" y="163" text-anchor="middle"
        fill="#7ca8ff" font-family="Inter,system-ui,sans-serif"
        font-size="9.5" font-weight="700" letter-spacing="0.8">QUALIFICATION</text>
  <text x="268" y="176" text-anchor="middle"
        fill="#7ca8ff" font-family="Inter,system-ui,sans-serif"
        font-size="9.5" font-weight="700" letter-spacing="0.8">VAPI</text>

  <!-- Arrow 2 → 3 -->
  <line x1="335" y1="100" x2="373" y2="100"
        stroke="rgba(255,255,255,0.18)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="371,95 384,100 371,105" fill="rgba(255,255,255,0.22)"/>

  <!-- ── NODE 3 · Google Calendar ── -->
  <rect x="386" y="50" width="130" height="100" rx="12"
        fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <g transform="translate(441,78) scale(0.833)"
     fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="4" width="18" height="18" rx="2"/>
    <line x1="16" y1="2" x2="16" y2="6"/>
    <line x1="8" y1="2" x2="8" y2="6"/>
    <line x1="3" y1="10" x2="21" y2="10"/>
    <path d="M9 16 l2 2 4-4"/>
  </g>
  <text x="451" y="163" text-anchor="middle"
        fill="rgba(255,255,255,0.45)" font-family="Inter,system-ui,sans-serif"
        font-size="9.5" font-weight="600" letter-spacing="0.8">RDV GOOGLE</text>
  <text x="451" y="176" text-anchor="middle"
        fill="rgba(255,255,255,0.45)" font-family="Inter,system-ui,sans-serif"
        font-size="9.5" font-weight="600" letter-spacing="0.8">CALENDAR</text>

  <!-- Arrow 3 → 4 -->
  <line x1="518" y1="100" x2="556" y2="100"
        stroke="rgba(255,255,255,0.18)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="554,95 567,100 554,105" fill="rgba(255,255,255,0.22)"/>

  <!-- ── NODE 4 · SMS client ── -->
  <rect x="569" y="50" width="130" height="100" rx="12"
        fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <g transform="translate(624,78) scale(0.833)"
     fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    <line x1="7" y1="9" x2="17" y2="9"/>
    <line x1="7" y1="13" x2="13" y2="13"/>
  </g>
  <text x="634" y="163" text-anchor="middle"
        fill="rgba(255,255,255,0.45)" font-family="Inter,system-ui,sans-serif"
        font-size="9.5" font-weight="600" letter-spacing="0.8">SMS RÉCAP</text>
  <text x="634" y="176" text-anchor="middle"
        fill="rgba(255,255,255,0.45)" font-family="Inter,system-ui,sans-serif"
        font-size="9.5" font-weight="600" letter-spacing="0.8">CLIENT</text>

  <!-- Arrow 4 → 5 -->
  <line x1="701" y1="100" x2="739" y2="100"
        stroke="rgba(255,255,255,0.18)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="737,95 750,100 737,105" fill="rgba(255,255,255,0.22)"/>

  <!-- ── NODE 5 · Mail serrurier ── -->
  <rect x="752" y="50" width="130" height="100" rx="12"
        fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <g transform="translate(807,80) scale(0.833)"
     fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="4" width="20" height="16" rx="2"/>
    <polyline points="2,4 12,13 22,4"/>
  </g>
  <text x="817" y="163" text-anchor="middle"
        fill="rgba(255,255,255,0.45)" font-family="Inter,system-ui,sans-serif"
        font-size="9.5" font-weight="600" letter-spacing="0.8">MAIL RÉCAP</text>
  <text x="817" y="176" text-anchor="middle"
        fill="rgba(255,255,255,0.45)" font-family="Inter,system-ui,sans-serif"
        font-size="9.5" font-weight="600" letter-spacing="0.8">SERRURIER</text>

</svg>
